<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnajový organizátor</title>
</head>
<body>
    <h1>Turnajový Organizátor</h1>
    <h2>Načíst nový turnaj</h2>

    <!-- Formulář, který pošle data metodou POST na adresu /scrape -->
    <form action="/scrape" method="POST">
        <label for="url">Zadej URL turnaje (sekce účastníci):</label><br><br>
        <input type="url" id="url" name="url" placeholder="https://www.vaseliga.cz/..." required style="width: 80%; padding: 8px;">
        <br><br>
        <button type="submit" style="padding: 10px 20px;">Načíst hráče</button>
    </form>
</body>
</html>
