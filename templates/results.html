{% extends "base_tournament.html" %}
{% block content %}

<h2>Výsledky</h2>
{% if ranking %}
    <ol>
        {% for entry in ranking %}
        <li><strong>{{ entry.place }}.místo:</strong> {{entry.name }}</li>
        {% endfor %}

    </ol>
{% else %}
    <div class="status-box"></div>
        <p>Turnaj se stále hraje</p>
{% endif %}

{% endblock %}
